services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: embedchat-postgres
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embedchat -d embedchat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build: .
    container_name: embedchat-app
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - ./firebase-sa.json:/app/firebase-sa.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    container_name: embedchat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal
      - web

  certbot:
    image: certbot/certbot
    container_name: embedchat-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_data:
  certbot_www:

networks:
  internal:
  web:
